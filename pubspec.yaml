name: lactosync
description: Dairy farm and milk delivery management app.
publish_to: 'none'
version: 4.11.1+39

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  dio: ^5.8.0+1
  intl: ^0.20.2
  shared_preferences: ^2.3.5
  cupertino_icons: ^1.0.8
  lucide_icons: ^0.257.0
  font_awesome_flutter: ^10.8.0
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  qr_flutter: ^4.1.0
  flutter_contacts: ^1.1.7
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/app_icon.png
  adaptive_icon_background: "#ECFDF5"
  adaptive_icon_foreground: assets/branding/app_icon.png

flutter:
  uses-material-design: true
  assets:
    - assets/branding/
