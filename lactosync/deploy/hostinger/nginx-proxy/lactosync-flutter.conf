# Flutter / Laravel API — separate from Blazor stack.
server {
    listen 80;
    server_name flutterapi.lactosync.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name flutterapi.lactosync.com;

    ssl_certificate /etc/letsencrypt/live/flutterapi.lactosync.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/flutterapi.lactosync.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    resolver 127.0.0.11 valid=30s ipv6=off;

    location / {
        set $upstream lactosync_flutter_app;
        proxy_pass http://$upstream:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120;
    }
}
