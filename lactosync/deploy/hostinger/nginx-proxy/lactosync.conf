# Original Blazor stack — do not modify without explicit approval.
server {
    listen 80;
    server_name app.lactosync.com api.lactosync.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name app.lactosync.com;

    ssl_certificate /etc/letsencrypt/live/app.lactosync.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.lactosync.com/privkey.pem;

    location / {
        proxy_pass http://lactosync-web:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl;
    server_name api.lactosync.com;

    ssl_certificate /etc/letsencrypt/live/app.lactosync.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.lactosync.com/privkey.pem;

    location / {
        proxy_pass http://lactosync-api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
