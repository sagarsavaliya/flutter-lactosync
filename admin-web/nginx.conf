server {
    listen 80;
    server_name superadmin.lactosync.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    server_name superadmin.lactosync.com;

    # TLS — certificates obtained via Certbot (certbot --nginx -d superadmin.lactosync.com)
    ssl_certificate     /etc/letsencrypt/live/superadmin.lactosync.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/superadmin.lactosync.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /var/www/lactosync-admin/dist;
    index index.html;

    # SPA fallback — all routes return index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://YOUR_VPS_API_DOMAIN;";
}
